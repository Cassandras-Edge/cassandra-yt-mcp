name: Deploy

on:
  push:
    branches: [main]
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: 172.20.0.161:30500
  GPU_BASE_TAG: cassandra-yt-mcp/gpu-base:cu128

jobs:
  build-and-push:
    runs-on: gh-arc-cassandra-yt-mcp
    strategy:
      matrix:
        include:
          - name: coordinator
            image: cassandra-yt-mcp/coordinator
            dockerfile: backend/Dockerfile.coordinator
            gpu: false
          - name: worker
            image: cassandra-yt-mcp/backend
            dockerfile: backend/Dockerfile
            gpu: true
    steps:
      - uses: actions/checkout@v4

      - name: Pull cached gpu-base image
        if: matrix.gpu
        run: docker pull ${{ env.REGISTRY }}/${{ env.GPU_BASE_TAG }} || true

      - name: Check if gpu-base needs rebuild
        if: matrix.gpu
        id: check-base
        run: |
          # Hash the gpu-base portion of the Dockerfile (from first FROM to app stage)
          BASE_HASH=$(sed -n '/^FROM nvidia/,/^FROM \${GPU_BASE}/p' backend/Dockerfile | sha256sum | cut -c1-16)
          # Compare with label on cached image
          CACHED_HASH=$(docker inspect --format='{{index .Config.Labels "gpu-base.hash"}}' \
            ${{ env.REGISTRY }}/${{ env.GPU_BASE_TAG }} 2>/dev/null || echo "none")
          if [ "$BASE_HASH" != "$CACHED_HASH" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "hash=$BASE_HASH" >> "$GITHUB_OUTPUT"
            echo "gpu-base changed ($CACHED_HASH → $BASE_HASH), rebuilding"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "gpu-base unchanged, skipping rebuild"
          fi

      - name: Build and push gpu-base
        if: matrix.gpu && steps.check-base.outputs.changed == 'true'
        run: |
          docker build \
            --target gpu-base \
            --build-arg HUGGINGFACE_TOKEN=${{ secrets.HUGGINGFACE_TOKEN }} \
            --label "gpu-base.hash=${{ steps.check-base.outputs.hash }}" \
            --cache-from ${{ env.REGISTRY }}/${{ env.GPU_BASE_TAG }} \
            -t ${{ env.REGISTRY }}/${{ env.GPU_BASE_TAG }} \
            backend/
          docker push ${{ env.REGISTRY }}/${{ env.GPU_BASE_TAG }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build image
        run: |
          BUILD_ARGS=""
          if [ "${{ matrix.gpu }}" = "true" ]; then
            BUILD_ARGS="--build-arg GPU_BASE=${{ env.REGISTRY }}/${{ env.GPU_BASE_TAG }}"
          fi
          docker build \
            $BUILD_ARGS \
            --build-arg YTDLP_CHANNEL=nightly \
            -f ${{ matrix.dockerfile }} \
            $(echo "${{ steps.meta.outputs.tags }}" | sed 's/^/-t /') \
            backend/

      - name: Push image
        run: |
          echo "${{ steps.meta.outputs.tags }}" | while read -r tag; do
            docker push "$tag"
          done
