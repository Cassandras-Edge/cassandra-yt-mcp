when:
  - event: [push, pull_request, cron]

steps:
  # â”€â”€ CI: tests (all branches, push + PR) â”€â”€

  - name: backend-test
    image: python:3.12-slim
    when:
      - event: [push, pull_request]
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - apt-get update && apt-get install -y --no-install-recommends git ca-certificates && rm -rf /var/lib/apt/lists/*
      - if [ -n "$GITHUB_TOKEN" ]; then printf 'machine github.com\nlogin x-access-token\npassword %s\n' "$GITHUB_TOKEN" > ~/.netrc && chmod 600 ~/.netrc; fi
      - cd backend
      - pip install -e ".[dev]"
      - pytest

  # â”€â”€ Deploy: Docker image via BuildKit (push to main only) â”€â”€

  - name: build-backend
    image: moby/buildkit:v0.21.1
    when:
      - event: push
        branch: main
    environment:
      AUTH_YAML_CONTENT:
        from_secret: auth_yaml
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - >
        buildctl
        --addr tcp://buildkitd.infra.svc.cluster.local:1234
        build
        --frontend dockerfile.v0
        --local context=backend
        --local dockerfile=backend
        --opt build-arg:YTDLP_CHANNEL=stable
        --opt "build-arg:AUTH_YAML_CONTENT=$AUTH_YAML_CONTENT"
        --opt "build-arg:GITHUB_TOKEN=$GITHUB_TOKEN"
        --output type=image,name=registry.infra.svc.cluster.local:5000/cassandra-media-mcp/backend:latest,push=true,registry.insecure=true

  - name: restart-backend
    image: moby/buildkit:v0.21.1
    when:
      - event: push
        branch: main
    commands:
      - |
        apk add --no-cache curl
        TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
        NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
        curl -sk -X PATCH \
          -H "Authorization: Bearer $TOKEN" \
          -H "Content-Type: application/strategic-merge-patch+json" \
          -d "{\"spec\":{\"template\":{\"metadata\":{\"annotations\":{\"kubectl.kubernetes.io/restartedAt\":\"$NOW\"}}}}}" \
          "https://kubernetes.default.svc/apis/apps/v1/namespaces/production/deployments/media-mcp"

  # â”€â”€ Cron: rebuild with latest yt-dlp stable (no cache) â”€â”€

  - name: rebuild-ytdlp
    image: moby/buildkit:v0.21.1
    when:
      - event: cron
        cron: ytdlp-update
    environment:
      AUTH_YAML_CONTENT:
        from_secret: auth_yaml
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - >
        buildctl
        --addr tcp://buildkitd.infra.svc.cluster.local:1234
        build
        --frontend dockerfile.v0
        --local context=backend
        --local dockerfile=backend
        --opt build-arg:YTDLP_CHANNEL=stable
        --opt "build-arg:AUTH_YAML_CONTENT=$AUTH_YAML_CONTENT"
        --opt "build-arg:GITHUB_TOKEN=$GITHUB_TOKEN"
        --opt no-cache=
        --output type=image,name=registry.infra.svc.cluster.local:5000/cassandra-media-mcp/backend:latest,push=true,registry.insecure=true

  - name: notify-success
    image: moby/buildkit:v0.21.1
    when:
      - status: success
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_webhook_url
    commands:
      - apk add --no-cache curl
      - >
        curl -sf --connect-timeout 5 --max-time 15
        -H "Content-Type: application/json"
        -d "{\"embeds\":[{\"title\":\"âś… $CI_REPO #$CI_PIPELINE_NUMBER\",\"description\":\"**Branch:** $CI_COMMIT_BRANCH\n**Commit:** \`$(echo $CI_COMMIT_SHA | cut -c1-7)\`\",\"color\":3066993,\"url\":\"$CI_PIPELINE_URL\"}]}"
        "$DISCORD_WEBHOOK_URL" || true

  - name: notify-failure
    image: moby/buildkit:v0.21.1
    when:
      - status: failure
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_webhook_url
    commands:
      - apk add --no-cache curl
      - >
        curl -sf --connect-timeout 5 --max-time 15
        -H "Content-Type: application/json"
        -d "{\"embeds\":[{\"title\":\"âťŚ $CI_REPO #$CI_PIPELINE_NUMBER\",\"description\":\"**Branch:** $CI_COMMIT_BRANCH\n**Commit:** \`$(echo $CI_COMMIT_SHA | cut -c1-7)\`\",\"color\":15158332,\"url\":\"$CI_PIPELINE_URL\"}]}"
        "$DISCORD_WEBHOOK_URL" || true
